{% extends 'portfolio/base.html' %}
{% load static %}

{% block content %}
<section id="upload">
    <div class="upload-container">
        <h1>Upload New Project</h1>

        <form method="post" enctype="multipart/form-data" class="upload-form">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <small class="help-text">{{ field.help_text }}</small>
                {% endif %}
                {% if field.errors %}
                <div class="error">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary">Upload Project</button>
        </form>
    </div>
</section>

<style>
.upload-container {
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 15px rgba(0,0,0,0.1);
}

.upload-form {
    margin-top: 30px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    color: green;
    font-weight: bold;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
}

.form-group textarea {
    resize: vertical;
}

.help-text {
    display: block;
    margin-top: 5px;
    color: #999;
    font-size: 12px;
}

.error {
    color: red;
    font-size: 14px;
    margin-top: 5px;
}
</style>
{% endblock %}
